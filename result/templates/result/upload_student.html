{% extends 'result/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="form-card">

        <h4 class="mb-4">Upload Students CSV</h4>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Select Class
                </label>

                <div class="d-flex gap-2">

                    <select name="class_id" 
                            class="form-select" 
                            required>

                        <option value="">
                            Select Class
                        </option>

                        {% for c in classes %}

                            <option value="{{ c.id }}">
                                {{ c.name }}
                                {% if c.section %}
                                    - {{ c.section }}
                                {% endif %}
                            </option>

                        {% endfor %}

                    </select>


                    <a href="{% url 'result:add_class' %}?next=upload_students"
                       class="btn btn-success">
                        + Add Class
                    </a>

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    CSV File
                </label>

                <input type="file"
                       name="csv_file"
                       class="form-control"
                       accept=".csv"
                       required>

            </div>


            <button type="submit"
                    name="upload_csv"
                    class="btn btn-primary">

                Upload Students

            </button>


        </form>


    </div>

</div>


{% endblock %}
