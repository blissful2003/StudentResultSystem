{% extends 'result/base.html' %}
{% load static %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card-header{
    background:#0d6efd;
    color:white;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    border-radius:15px 15px 0 0!important;
}

.form-control{
    border-radius:10px;
}

.form-check{
    padding:8px 30px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:8px;
    transition:.3s;
}

.form-check:hover{
    background:#eef5ff;
}

.section-title{
    font-weight:600;
    color:#0d6efd;
    margin-bottom:10px;
}

.btn{
    border-radius:10px;
}

.checkbox-container{
    max-height:250px;
    overflow-y:auto;
}
</style>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card">

                <div class="card-header">
                    Edit Teacher
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>

                                <input
                                    type="text"
                                    name="first_name"
                                    class="form-control"
                                    value="{{ user.first_name }}"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>

                                <input
                                    type="text"
                                    name="last_name"
                                    class="form-control"
                                    value="{{ user.last_name }}"
                                    required>
                            </div>

                        </div>


                        <div class="mb-4">

                            <label class="form-label">Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                value="{{ user.email }}">

                        </div>


                        <div class="row">

                            <!-- Subjects -->

                            <div class="col-md-6">

                                <h5 class="section-title">
                                    Assign Subjects
                                </h5>

                                <div class="checkbox-container">

                                {% for subject in subjects %}

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        name="subjects"
                                        value="{{ subject.id }}"
                                        id="subject{{ subject.id }}"

                                        {% for a in assignments %}
                                            {% if a.subject_name.id == subject.id %}
                                                checked
                                            {% endif %}
                                        {% endfor %}
                                    >

                                    <label class="form-check-label" for="subject{{ subject.id }}">
                                        {{ subject.name }}
                                    </label>

                                </div>

                                {% endfor %}

                                </div>

                            </div>


                            <!-- Classes -->

                            <div class="col-md-6">

                                <h5 class="section-title">
                                    Assign Classes
                                </h5>

                                <div class="checkbox-container">

                                {% for class in classes %}

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        name="assigned_classes"
                                        value="{{ class.id }}"
                                        id="class{{ class.id }}"

                                        {% for a in assignments %}
                                            {% if a.class_assigned.id == class.id %}
                                                checked
                                            {% endif %}
                                        {% endfor %}
                                    >

                                    <label class="form-check-label" for="class{{ class.id }}">
                                        {{ class.name }}
                                    </label>

                                </div>

                                {% endfor %}

                                </div>

                            </div>

                        </div>


                        <div class="text-center mt-4">

                            <button type="submit" class="btn btn-primary px-5">
                                Update Teacher
                            </button>

                            <a href="{% url 'teacher_list' %}" class="btn btn-secondary px-4">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
