{% extends 'result/base.html' %}
{% block content %}
<style>
  body {
    background: #f0f4ff;
  }

  .login-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(26, 115, 232, 0.13);
    padding: 2.5rem 2.2rem 2rem;
    width: 100%;
    max-width: 420px;
  }

  .login-logo {
    width: 68px;
    height: 68px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1.2rem;
  }

  .login-title {
    font-size: 1.45rem;
    font-weight: 700;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 0.2rem;
  }

  .login-subtitle {
    font-size: 0.88rem;
    color: #888;
    text-align: center;
    margin-bottom: 1.8rem;
  }

  .form-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 5px;
  }

  .form-control {
    border-radius: 10px;
    border: 1.5px solid #e0e0e0;
    padding: 0.65rem 1rem;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-control:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.12);
  }

  .input-icon-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 1rem;
    cursor: pointer;

  }

  .btn-login {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.72rem;
    font-size: 1rem;
    font-weight: 600;
    width: 100%;
    margin-top: 0.5rem;
    transition: opacity 0.15s, transform 0.15s;
  }

  .btn-login:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    color: white;
  }

  .btn-login:active {
    transform: scale(0.98);
  }

  .divider {
    border: none;
    border-top: 1.5px solid #f0f0f0;
    margin: 1.5rem 0 1rem;
  }

  .footer-note {
    text-align: center;
    font-size: 0.8rem;
    color: #aaa;
  }

  .alert {
    border-radius: 10px;
    font-size: 0.88rem;
    padding: 0.65rem 1rem;
    margin-bottom: 1.2rem;
  }
</style>



<div class="login-wrapper">
  <div class="login-card">


    <div class="login-logo">🎓 </div>
    <div class="login-title">Student Result System</div>
    <div class="login-subtitle">Login to your admin account</div>


    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
      {{ msg }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST" autocomplete="off">
      {% csrf_token %}


      <div class="mb-3">
        <label class="form-label" for="username"> Username</label>
        <div class="input-icon-wrap">
          <input type="text" name="username" id="username" class="form-control" placeholder="Enter your admin username">
        </div>
      </div>


      <div class="mb-3">
        <label class="form-label" for="password"> Password</label>
        <div class="input-icon-wrap">
          <input type="password" name="password" id="password" class="form-control pe-5"
            placeholder="Enter your password" required>
          <span class="input-icon" onclick="togglePassword()" title="Password dekhaunus">

          </span>
        </div>
      </div>


      <button type="submit" class="btn-login">Login please</button>



    </form>

    <hr class="divider">

    <div class="footer-note">
      this place is only for admins<br>

    </div>

  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>

{% endblock %}
