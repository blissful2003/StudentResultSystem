<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a73e8;
            margin: 0;
        }

        .logo p {
            color: #aaa;
            font-size: 0.85rem;
            margin: 4px 0 0;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .btn-login {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .register-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.88rem;
            color: #666;
        }

        .register-link a {
            color: #1a73e8;
            font-weight: 600;
            text-decoration: none;
        }

        .admin-link {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.82rem;
        }

        .admin-link a {
            color: #aaa;
            text-decoration: none;
        }

        .admin-link a:hover {
            color: #666;
        }

        .alert {
            border-radius: 10px;
            font-size: 0.88rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo">
            <h2> Student Login</h2>
            <p>Login to view your results</p>
        </div>

        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %}">
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required
                    autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
<a href="{% url 'result:password_reset' %}">
    Forgot Password?
</a>


        <div class="admin-link">
            <a href="{% url 'result:admin_login' %}"> Admin Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
