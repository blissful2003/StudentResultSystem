<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f0f4ff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI',sans-serif;
}


.password-card{

    width:450px;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    overflow:hidden;

}


.card-header{

    background:linear-gradient(135deg,#1a73e8,#0d47a1);
    color:white;
    padding:20px;
    text-align:center;

}


.card-body{

    padding:30px;

}


.form-label{

    font-weight:600;

}


input{

    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;

}


button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#1a73e8;
    color:white;
    font-weight:600;

}


button:hover{

    background:#0d47a1;

}


.errorlist{

    color:red;
    font-size:14px;
    padding-left:0;
    list-style:none;

}


</style>

</head>


<body>


<div class="password-card">


<div class="card-header">

<h4>
🔐 Change Password
</h4>

<p class="mb-0">
Update your account password
</p>

</div>



<div class="card-body">


{% if messages %}

{% for message in messages %}

<div class="alert alert-{{message.tags}}">
{{message}}
</div>

{% endfor %}

{% endif %}





<form method="POST">

{% csrf_token %}



{% for field in form %}


<div class="mb-3">


<label class="form-label">

{{ field.label }}

</label>


{{ field }}



{% if field.errors %}

<div class="text-danger small">

{{ field.errors }}

</div>

{% endif %}


</div>


{% endfor %}





<button type="submit">

Change Password

</button>



</form>


</div>


</div>


</body>

</html>
