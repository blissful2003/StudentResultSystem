<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:350px;
            background:#fff;
            padding:35px;
            border-radius:10px;
            box-shadow:0 2px 12px rgba(0,0,0,.1);
        }

        .btn-login{
            width:100%;
            background:#4e73df;
            color:#fff;
            border:none;
            padding:10px;
            border-radius:6px;
        }

        .btn-login:hover{
            background:#2e59d9;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h4 class="text-center mb-4">Teacher Login</h4>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'result:teacher_login' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required
            >
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>
    </form>

</div>

</body>
</html>
